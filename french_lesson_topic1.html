function VocabFlashcards({ words, color }) {
  const [flipped, setFlipped] = useState({});
  const [showAll, setShowAll] = useState(false);
  return (
    <div>
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: "0.75rem" }}>
        <button onClick={() => setShowAll(p => !p)} style={{ background: `${color}22`, border: `1px solid ${color}66`, color, borderRadius: "20px", padding: "0.3rem 0.9rem", fontSize: "0.8rem" }}>
          {showAll ? "Hide all translations" : "Show all translations"}
        </button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(180px,1fr))", gap: "0.65rem" }}>
        {words.map((w, i) => (
          <div key={i} onClick={() => setFlipped(p => ({ ...p, [i]: !p[i] }))}
            style={{ background: (flipped[i] || showAll) ? `${color}18` : "rgba(255,255,255,0.04)", border: `1px solid ${(flipped[i] || showAll) ? color : "#2a2a2a"}`, borderRadius: "10px", padding: "0.9rem", cursor: "pointer", transition: "all 0.2s", minHeight: "60px" }}>
            <div style={{ fontWeight: 700, color, fontSize: "0.95rem" }}>{w.fr}</div>
            {(flipped[i] || showAll) && <div style={{ color: "#ccc", fontSize: "0.82rem", marginTop: "0.25rem", fontStyle: "italic" }}>{w.en}</div>}
          </div>
        ))}
      </div>
    </div>
  );
}

function VerbTable({ verb, forms, color }) {
  return (
    <div style={{ background: "rgba(0,0,0,0.3)", borderRadius: "10px", overflow: "hidden", border: `1px solid ${color}44` }}>
      <div style={{ background: `${color}22`, padding: "0.6rem 1rem", borderBottom: `1px solid ${color}33` }}>
        <span style={{ color, fontWeight: 700, fontSize: "1rem" }}>{verb}</span>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr" }}>
        {forms.map((f, i) => (
          <div key={i} style={{ padding: "0.5rem 1rem", borderBottom: i < forms.length - 2 ? "1px solid #1a1a1a" : "none", borderRight: i % 2 === 0 ? "1px solid #1a1a1a" : "none" }}>
            <span style={{ color: "#666", fontSize: "0.75rem", marginRight: "0.5rem" }}>{pronouns[i]}</span>
            <span style={{ color: "#f0ece4", fontSize: "0.9rem" }}>{f}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

      <p style={{ color: "#888", marginBottom: "2rem", fontStyle: "italic" }}>Click each group to expand conjugation tables and exercises</p>

        <div key={gi} style={{ marginBottom: "1rem" }}>
          <div onClick={() => setExpanded(p => ({ ...p, [gi]: !p[gi] }))} style={{
            background: expanded[gi] ? `${g.color}18` : "rgba(255,255,255,0.04)",

              <div style={{ color: "#888", fontSize: "0.85rem", marginTop: "0.2rem" }}>Terminaisons : <span style={{ color: g.color }}>{g.rule}</span></div>
            </div>
            <span style={{ color: g.color, fontSize: "1.2rem" }}>{expanded[gi] ? "▲" : "▼"}</span>
          </div>
          {expanded[gi] && (
            <div style={{ border: `1px solid ${g.color}44`, borderTop: "none", borderRadius: "0 0 12px 12px", padding: "1.5rem", background: `${g.color}08` }}>
              <div style={{ background: `${g.color}15`, border: `1px solid ${g.color}33`, borderRadius: "8px", padding: "0.75rem 1rem", marginBottom: "1.25rem", fontSize: "0.9rem", color: "#ccc" }}>

                  <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: "1rem" }}>
                    {g.models.map((m, mi) => <VerbTable key={mi} verb={m.verb} forms={m.forms} color={g.color} />)}
                  </div>

              )}
              {g.exercise && (
                <div>
                  <p style={{ color: "#888", fontSize: "0.8rem", textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.75rem" }}>✏️ À toi — Conjugue ces verbes</p>
                  {g.exercise.map((verb, vi) => (
                    <div key={vi} style={{ marginBottom: "1rem" }}>
                      <p style={{ color: g.color, fontWeight: 700, marginBottom: "0.5rem" }}>{verb}</p>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0.4rem" }}>
                        {pronouns.map((pr, pi) => (
                          <div key={pi} style={{ display: "flex", alignItems: "center", gap: "0.5rem", background: "rgba(0,0,0,0.2)", borderRadius: "6px", padding: "0.4rem 0.75rem" }}>
                            <span style={{ color: "#666", fontSize: "0.8rem", minWidth: "70px" }}>{pr}</span>
                            <input
                              value={answers[`${gi}-${vi}-${pi}`] || ""}
                              onChange={e => setAnswers(p => ({ ...p, [`${gi}-${vi}-${pi}`]: e.target.value }))}

                              style={{ background: "transparent", border: "none", borderBottom: `1px solid ${g.color}44`, color: "#f0ece4", fontSize: "0.9rem", outline: "none", flex: 1, padding: "0.1rem 0.2rem" }}
                            />

function MatchExercise() {
  const words = Object.keys(matchAnswers);
  const allAnswers = Object.values(matchAnswers);
  const [shuffled] = useState(() => [...allAnswers].sort(() => Math.random() - 0.5));
  const [selected, setSelected] = useState({});
  const [checked, setChecked] = useState(false);

  const handleSelect = (wordIdx, ans) => {
    if (checked) return;
    setSelected(p => ({ ...p, [wordIdx]: ans }));
  };

  const score = checked ? words.filter((w, i) => selected[i] === matchAnswers[w]).length : 0;

  return (
    <div>
      <h3 style={{ color: ACCENT, marginBottom: "0.5rem" }}>A. Vocabulary Match</h3>
      <p style={{ color: "#888", fontSize: "0.9rem", marginBottom: "1.25rem", fontStyle: "italic" }}>Match each French word with its English meaning by clicking an answer.</p>
      <div style={{ display: "grid", gap: "0.75rem", marginBottom: "1.25rem" }}>
        {words.map((word, wi) => (
          <div key={wi} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid #222", borderRadius: "10px", padding: "0.75rem 1rem" }}>
            <div style={{ fontWeight: 700, color: ACCENT, marginBottom: "0.5rem" }}>{word}</div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem" }}>
              {shuffled.map((ans, ai) => {
                const isSelected = selected[wi] === ans;
                const isCorrect = checked && isSelected && ans === matchAnswers[word];
                const isWrong = checked && isSelected && ans !== matchAnswers[word];
                const isMissed = checked && !isSelected && ans === matchAnswers[word];
                return (
                  <button key={ai} onClick={() => handleSelect(wi, ans)} style={{
                    background: isCorrect ? "#4caf7d33" : isWrong ? "#e9456033" : isMissed ? "#f5a62333" : isSelected ? `${ACCENT}22` : "rgba(255,255,255,0.05)",
                    border: `1px solid ${isCorrect ? "#4caf7d" : isWrong ? "#e94560" : isMissed ? "#f5a623" : isSelected ? ACCENT : "#333"}`,
                    color: isCorrect ? "#4caf7d" : isWrong ? "#e94560" : isMissed ? "#f5a623" : isSelected ? ACCENT : "#aaa",
                    borderRadius: "20px", padding: "0.25rem 0.65rem", fontSize: "0.82rem", transition: "all 0.15s"
                  }}>{ans}</button>
                );
              })}
            </div>
          </div>
        ))}
      </div>
      <div style={{ display: "flex", gap: "0.75rem", alignItems: "center" }}>
        <button onClick={() => setChecked(true)} style={{ background: ACCENT, border: "none", color: "#fff", borderRadius: "8px", padding: "0.6rem 1.25rem", fontWeight: 600, fontSize: "0.9rem" }}>Check answers ✓</button>
        <button onClick={() => { setChecked(false); setSelected({}); }} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid #333", color: "#aaa", borderRadius: "8px", padding: "0.6rem 1.25rem", fontSize: "0.9rem" }}>Reset</button>
        {checked && <span style={{ color: score === words.length ? "#4caf7d" : "#f5a623", fontWeight: 700 }}>{score}/{words.length} correct!</span>}
      </div>
    </div>
  );
}

function FillBlanks() {
  const [answers, setAnswers] = useState({});
  const [checked, setChecked] = useState(false);
  const score = checked ? fillBlanks.filter((q, i) => answers[i] === q.answer).length : 0;
  return (
    <div>
      <h3 style={{ color: ACCENT2, marginBottom: "0.5rem" }}>B. Fill in the Blank</h3>
      <p style={{ color: "#888", fontSize: "0.9rem", marginBottom: "1.25rem", fontStyle: "italic" }}>Choose the correct word: <strong style={{ color: ACCENT2 }}>CONFIANTE · TIMIDE · ROUTINE · ATTEINDRE</strong></p>
      <div style={{ display: "grid", gap: "0.75rem", marginBottom: "1.25rem" }}>
        {fillBlanks.map((q, qi) => {
          const chosen = answers[qi];
          const isCorrect = checked && chosen === q.answer;
          const isWrong = checked && chosen && chosen !== q.answer;
          return (
            <div key={qi} style={{ background: isCorrect ? "rgba(76,175,125,0.08)" : isWrong ? "rgba(233,69,96,0.08)" : "rgba(255,255,255,0.03)", border: `1px solid ${isCorrect ? "#4caf7d" : isWrong ? "#e94560" : "#222"}`, borderRadius: "10px", padding: "1rem 1.25rem" }}>
              <p style={{ marginBottom: "0.75rem", lineHeight: 1.7, fontSize: "1rem" }}>
                {q.sentence.split("______").map((part, pi) => (
                  <span key={pi}>{part}{pi === 0 && <span style={{ color: chosen ? (isCorrect ? "#4caf7d" : isWrong ? "#e94560" : ACCENT2) : "#555", fontWeight: 700, borderBottom: `2px solid ${isCorrect ? "#4caf7d" : isWrong ? "#e94560" : ACCENT2}44`, padding: "0 0.25rem" }}>{chosen || "______"}</span>}</span>
                ))}
              </p>
              <div style={{ display: "flex", flexWrap: "wrap", gap: "0.4rem" }}>
                {q.options.map((opt, oi) => (
                  <button key={oi} onClick={() => !checked && setAnswers(p => ({ ...p, [qi]: opt }))} style={{
                    background: answers[qi] === opt ? `${ACCENT2}22` : "rgba(255,255,255,0.05)",
                    border: `1px solid ${answers[qi] === opt ? ACCENT2 : "#333"}`,
                    color: answers[qi] === opt ? ACCENT2 : "#aaa",
                    borderRadius: "20px", padding: "0.25rem 0.75rem", fontSize: "0.82rem", transition: "all 0.15s"
                  }}>{opt}</button>
                ))}
              </div>
              {checked && <p style={{ marginTop: "0.5rem", fontSize: "0.82rem", color: isCorrect ? "#4caf7d" : "#e94560", fontStyle: "italic" }}>{isCorrect ? "✓ Correct !" : `✗ Answer: ${q.answer} — ${q.note}`}</p>}
            </div>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: "0.75rem", alignItems: "center" }}>
        <button onClick={() => setChecked(true)} style={{ background: ACCENT2, border: "none", color: "#fff", borderRadius: "8px", padding: "0.6rem 1.25rem", fontWeight: 600, fontSize: "0.9rem" }}>Check answers ✓</button>
        <button onClick={() => { setChecked(false); setAnswers({}); }} style={{ background: "rgba(255,255,255,0.06)", border: "1px solid #333", color: "#aaa", borderRadius: "8px", padding: "0.6rem 1.25rem", fontSize: "0.9rem" }}>Reset</button>
        {checked && <span style={{ color: score === fillBlanks.length ? "#4caf7d" : "#f5a623", fontWeight: 700 }}>{score}/{fillBlanks.length} correct!</span>}
      </div>
    </div>
  );
}

function VerbQuestions() {
  const questions = [
    "À quelle heure vous venez au cours ?",
    "Vous prenez quoi au petit déjeuner ?",
    "Vous faites du sport ?",
    "Où allez-vous le week-end ?",
  ];
  const verbs = ["venir", "prendre", "faire", "aller"];
  const [answers, setAnswers] = useState({});
  return (
    <div>
      <h3 style={{ color: ACCENT3, marginBottom: "0.5rem" }}>C. Réponds avec une phrase complète</h3>
      <p style={{ color: "#888", fontSize: "0.9rem", marginBottom: "1.25rem", fontStyle: "italic" }}>Answer each question in a full French sentence using the verb shown.</p>
      <div style={{ display: "grid", gap: "1rem" }}>
        {questions.map((q, qi) => (
          <div key={qi} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid #222", borderRadius: "10px", padding: "1rem 1.25rem" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "0.65rem" }}>
              <p style={{ fontWeight: 600, lineHeight: 1.5, color: "#f0ece4", flex: 1 }}>{q}</p>
              <span style={{ background: `${ACCENT3}22`, border: `1px solid ${ACCENT3}55`, color: ACCENT3, borderRadius: "12px", padding: "0.2rem 0.6rem", fontSize: "0.75rem", marginLeft: "0.75rem", whiteSpace: "nowrap" }}>{verbs[qi]}</span>
            </div>
            <textarea
              value={answers[qi] || ""}
              onChange={e => setAnswers(p => ({ ...p, [qi]: e.target.value }))}
              placeholder="Ta réponse ici…"
              rows={2}
              style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid #333", borderRadius: "6px", padding: "0.6rem 0.75rem", color: "#f0ece4", fontSize: "0.9rem", outline: "none" }}
            />
          </div>
        ))}
      </div>
    </div>
  );
}

function RestructureExercise() {

  return (

      <div style={{ display: "grid", gap: "1rem" }}>
        {restructureEx.map((ex, ei) => (
          <div key={ei} style={{ background: "rgba(255,255,255,0.03)", border: "1px solid #222", borderRadius: "10px", padding: "1rem 1.25rem" }}>
            <div style={{ display: "flex", gap: "0.75rem", alignItems: "flex-start" }}>
              <span style={{ color: ACCENT4, fontWeight: 700, minWidth: "20px" }}>{ei + 1}.</span>
              <div style={{ flex: 1 }}>
                <div style={{ background: "rgba(126,200,227,0.08)", border: "1px solid rgba(126,200,227,0.25)", borderRadius: "6px", padding: "0.5rem 0.75rem", marginBottom: "0.65rem", fontSize: "0.9rem", color: "#aaa", fontStyle: "italic" }}>
                  {ex.jumbled}
                </div>
                <input
                  value={answers[ei] || ""}
                  onChange={e => setAnswers(p => ({ ...p, [ei]: e.target.value }))}
                  placeholder="Ta réponse…"
                  style={{ width: "100%", background: "rgba(0,0,0,0.3)", border: "1px solid #333", borderRadius: "6px", padding: "0.5rem 0.75rem", color: "#f0ece4", fontSize: "0.9rem", outline: "none", marginBottom: "0.5rem" }}

                <div style={{ display: "flex", gap: "0.5rem" }}>
                  <button onClick={() => setRevealed(p => ({ ...p, [ei]: !p[ei] }))} style={{ background: `${ACCENT4}18`, border: `1px solid ${ACCENT4}44`, color: ACCENT4, borderRadius: "20px", padding: "0.25rem 0.75rem", fontSize: "0.8rem" }}>
